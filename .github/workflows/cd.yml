name: Release

on:
  # push:
  #   tags:
  #     - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g., v1.2.3)"
        required: false
        type: string

permissions:
  contents: write

env:
  APP_NAME: plexos2duckdb
  # Prefer the dispatch input; otherwise use the tag that triggered the workflow
  TAG: ${{ inputs.tag != '' && inputs.tag || github.ref_name }}
  # Fully-qualified ref for actions that need it
  REF: ${{ inputs.tag != '' && format('refs/tags/{0}', inputs.tag) || github.ref }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.REF }}

      - name: Checkout test data
        uses: actions/checkout@v4
        with:
          repository: kdheepak/plexos-solution-files
          path: tests/data/plexos-solution-files
          fetch-depth: 1

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Run test suite
        run: just test

  create-release:
    name: Create Release
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.REF }}

      # Creates the GitHub Release for the tag if it doesn't exist yet
      - name: Create GitHub Release
        uses: taiki-e/create-gh-release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ env.REF }}

  publish-python:
    name: Publish Python package
    needs: [upload-python-distributions, upload-binaries]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/plexos2duckdb
    steps:
      - name: Download Python distributions
        uses: actions/download-artifact@v4
        with:
          pattern: python-dist-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  upload-python-distributions:
    name: Build & Upload Python distributions (${{ matrix.name }})
    needs: [create-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            python-architecture: x64
            sdist: true

          - name: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            python-architecture: arm64
            sdist: false

          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            python-architecture: x64
            sdist: false

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.REF }}

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: ${{ matrix.python-architecture }}

      - name: Build Python distributions
        uses: PyO3/maturin-action@v1
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_RUSTFLAGS: "-l Rstrtmgr"
        with:
          command: build
          target: ${{ matrix.target }}
          args: >-
            --release --locked --out dist ${{ matrix.sdist && '--sdist' || '' }}

      - name: Upload Python distributions to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: |
            dist/*

      - name: Upload Python distributions as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-dist-${{ matrix.name }}
          path: dist/*
          if-no-files-found: error

  upload-binaries:
    name: Build & Upload ${{ matrix.name }}
    needs: [create-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-gnu
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_suffix: linux-x86_64

          - name: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            archive_suffix: macos-aarch64

          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_suffix: windows-x86_64

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.REF }}

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Upload rust binary to GitHub Release
        uses: taiki-e/upload-rust-binary-action@v1
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_RUSTFLAGS: "-l Rstrtmgr"
        with:
          bin: ${{ env.APP_NAME }}
          token: ${{ secrets.GITHUB_TOKEN }}
          target: ${{ matrix.target }}
          archive: $bin-$tag-${{ matrix.archive_suffix }}
          checksum: sha256
          locked: true
          ref: ${{ env.REF }}
          include: LICENSE,README.md
          leading-dir: true
